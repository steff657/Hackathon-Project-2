{% extends "core/base.html" %}

{% block title %}About Us{% endblock %}
{% block body_class %}about-page{% endblock %}

{% block content %}

<div class="row align-items-center g-4 justify-content-center">
    <div class="col-lg-9">
        <h1>{{ about.title }}</h1>
        <div class="lead card-soft px-4 pb-4 pt-2">
            <p>{{ about.content|safe }}</p>
            <div class="text-center mt-4 ">
                <a href="{% url 'book_court' %}" class="btn btn-accent btn-lg">Book Now</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
